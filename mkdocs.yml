site_name: Ascend-8tof Documentation
site_description: 360° VL53L8CX time-of-flight obstacle-sensing system — hardware, firmware, and VOXL integration
site_author: Ascend Engineering

# Change this to your published URL (GitLab/GitHub Pages) once known.
# site_url: https://<group>.gitlab.io/ascend-8tof-docs/

theme:
  name: material
  logo: assets/logo-inverse.png
  favicon: assets/logo-mark.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode is the default (matches the light-bodied ascendengineer.com feel)
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode available via the toggle
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant      # SPA-style fast page loads
    - navigation.tracking     # update URL with active anchor
    - navigation.top          # back-to-top button
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy       # copy button on code blocks
    - content.tabs.link

nav:
  - Overview: index.md
  - Hardware Overview: 01-hardware.md
  - Power & Voltage Ranges: 02-power.md
  - Communications & Protocols: 03-comms-protocol.md
  - STM32 Firmware: 04-firmware.md
  - VOXL Integration: 05-voxl-integration.md
  - Bring-up & Setup: 06-bringup-setup.md

markdown_extensions:
  - admonition                # nice callout boxes for the ⚠️ notes
  - pymdownx.details
  - pymdownx.superfences       # fenced code + diagrams
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/extra.css

extra:
  # Add real handles when ready, e.g.:
  # social:
  #   - icon: fontawesome/brands/linkedin
  #     link: https://www.linkedin.com/company/<your-company>
  generator: false

copyright: Copyright &copy; Ascend Engineering — Next-Generation UAV Engineering Solutions

docs_dir: docs
