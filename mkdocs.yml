site_name: Ascend Engineering Documentation
site_description: Documentation for Ascend Engineering hardware and software — UAV companion computers, sensor systems, firmware, and integration guides
site_author: Ascend Engineering

site_url: https://docs.ascendengineer.com/

theme:
  name: material
  logo: assets/logo-inverse.png
  favicon: assets/logo-mark.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode is the default (matches the light-bodied ascendengineer.com feel)
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode available via the toggle
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant      # SPA-style fast page loads
    - navigation.tracking     # update URL with active anchor
    - navigation.top          # back-to-top button
    - navigation.tabs         # top-level products as tabs in the header
    - navigation.sections
    - navigation.indexes      # a section's index page IS its landing page
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy       # copy button on code blocks
    - content.tabs.link

# Top level = one entry per product. Add new hardware/software as sibling
# sections (each its own folder under docs/) as the docs grow.
nav:
  - Home: index.md
  - Ascend 8tof:
    - ascend-8tof/index.md
    - Hardware Overview: ascend-8tof/01-hardware.md
    - Power & Voltage Ranges: ascend-8tof/02-power.md
    - Communications & Protocols: ascend-8tof/03-comms-protocol.md
    - STM32 Firmware: ascend-8tof/04-firmware.md
    - Integration (any host): ascend-8tof/05-integration.md
    - Bring-up & Setup: ascend-8tof/06-bringup-setup.md

markdown_extensions:
  - admonition                # nice callout boxes for the ⚠️ notes
  - pymdownx.details
  - pymdownx.superfences       # fenced code + diagrams
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list                  # grid cards on the hub page
  - md_in_html                 # grid cards on the hub page
  - pymdownx.emoji:            # :material-...: icons in cards
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/extra.css

extra:
  # Add real handles when ready, e.g.:
  # social:
  #   - icon: fontawesome/brands/linkedin
  #     link: https://www.linkedin.com/company/<your-company>
  generator: false

copyright: Copyright &copy; Ascend Engineering — Next-Generation UAV Engineering Solutions

docs_dir: docs
