# GitLab Pages deploy for Material for MkDocs.
# Publishes to https://<group-or-user>.gitlab.io/<project>/ on every push to the
# default branch. GitLab serves whatever the `pages` job puts in `public/`.
image: python:3.12-slim

pages:
  stage: deploy
  script:
    - pip install --no-cache-dir -r requirements.txt
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
